name: Build And Send APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - mobile_app/**
      - .github/workflows/build-and-send-apk.yml

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaida-release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Validate Telegram secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "TELEGRAM_BOT_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "TELEGRAM_CHAT_ID is not set"
            exit 1
          fi

      - name: Send APK to Telegram
        working-directory: .
        run: |
          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F caption="Qaida APK ${GITHUB_SHA}" \
            -F document=@"mobile_app/build/app/outputs/flutter-apk/app-release.apk"