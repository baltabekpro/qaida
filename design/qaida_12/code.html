<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2463eb',
            'background-light': '#f6f7fb',
            'background-dark': '#0f172a',
            'card-dark': '#111827'
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen overflow-hidden">
  <div class="relative min-h-screen">
    <div class="absolute inset-0 bg-gradient-to-b from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-950 p-4">
      <div class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="flex items-center justify-between">
          <h1 class="text-lg font-bold">Сохранённые места</h1>
          <span class="material-symbols-outlined text-slate-400">more_horiz</span>
        </div>
        <div class="mt-5 space-y-3">
          <div class="flex gap-3 rounded-2xl bg-slate-50 p-3 dark:bg-slate-950">
            <div class="h-20 w-20 rounded-2xl bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=600&q=80');"></div>
            <div>
              <h2 class="font-bold">The Choco</h2>
              <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Кофейня · 4.9</p>
            </div>
          </div>
          <div class="flex gap-3 rounded-2xl bg-slate-50 p-3 dark:bg-slate-950 opacity-50">
            <div class="h-20 w-20 rounded-2xl bg-slate-200 dark:bg-slate-800"></div>
            <div class="flex-1">
              <div class="h-4 w-28 rounded-full bg-slate-200 dark:bg-slate-800"></div>
              <div class="mt-3 h-3 w-20 rounded-full bg-slate-200 dark:bg-slate-800"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="absolute inset-0 bg-slate-950/28 backdrop-blur-[2px]"></div>

    <div class="absolute left-1/2 top-1/2 w-[88%] max-w-[290px] -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-slate-200 bg-white p-5 shadow-[0_24px_60px_rgba(15,23,42,0.22)] dark:border-slate-800 dark:bg-slate-900">
      <div class="flex size-12 items-center justify-center rounded-2xl bg-blue-50 text-primary dark:bg-blue-500/15 dark:text-blue-200">
        <span class="material-symbols-outlined">delete</span>
      </div>
      <h2 class="mt-5 text-2xl font-bold leading-tight">Удалить из сохранённых?</h2>
      <p class="mt-3 text-sm leading-6 text-slate-500 dark:text-slate-400">Это место исчезнет из коллекции, но его можно будет сохранить снова позже.</p>
      <div class="mt-6 flex gap-2">
        <button class="h-11 flex-1 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 dark:border-slate-700 dark:text-slate-200">Отмена</button>
        <button class="h-11 flex-1 rounded-2xl bg-primary text-sm font-bold text-white shadow-[0_14px_30px_rgba(37,99,235,0.22)]">Удалить</button>
      </div>
    </div>
  </div>
</body>
</html>
