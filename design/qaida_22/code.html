<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#2463eb','background-light':'#f6f7fb','background-dark':'#0f172a','card-dark':'#111827'}}}};</script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-background-light/90 p-4 backdrop-blur-md dark:border-slate-800 dark:bg-background-dark/90">
    <div class="flex items-center justify-between gap-3">
      <button class="flex size-10 items-center justify-center rounded-full text-slate-600 dark:text-slate-300"><span class="material-symbols-outlined">arrow_back</span></button>
      <h1 class="flex-1 pr-10 text-center text-lg font-bold">Мои данные</h1>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4">
    <section class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-card-dark">
      <div class="flex items-center gap-4">
        <div class="size-20 overflow-hidden rounded-full border-2 border-primary/20">
          <img class="h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmSDHU8OooC4XjK7v7OmG7eXHf6WAJNjhEFpb4dKodjSXAEJBgl2Zl-lj5hBJaoibDb4m7zbETAn9uq3HORRqJhNUYbyNWbvL7MwcP0Ly4-Kl8dvqyLoDn8dFWZaj0nnS-3EIdwZyTIyPp8_py_lPOc74ge2eJRkf6pdjDbNJ8uqwlJr9BiCBo-n_rBDWlmYx-iyaQ85S9I8BqNycQfH7JvEf2XD0DLHxRaF2iSZTmLEHI6IhBWdm9Z_izFzjtsoYoRNuOc-vabw" alt="avatar" />
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Профиль</p>
          <h2 class="mt-1 text-[24px] font-semibold tracking-[-0.03em]">Александр</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">alexander@qaida.app</p>
        </div>
      </div>
    </section>

    <section class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-card-dark">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Личные данные</p>
      <div class="mt-4 space-y-3">
        <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div class="text-xs font-semibold text-slate-400">Имя</div><div class="mt-1 text-sm font-semibold">Александр</div></div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div class="text-xs font-semibold text-slate-400">Город</div><div class="mt-1 text-sm font-semibold">Алматы</div></div>
        <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div class="text-xs font-semibold text-slate-400">Любимые сценарии</div><div class="mt-1 flex flex-wrap gap-2"><span class="rounded-full bg-primary/10 px-3 py-2 text-[13px] font-semibold text-primary">Кофе</span><span class="rounded-full bg-primary/10 px-3 py-2 text-[13px] font-semibold text-primary">Прогулки</span><span class="rounded-full bg-primary/10 px-3 py-2 text-[13px] font-semibold text-primary">Тихие ужины</span></div></div>
      </div>
    </section>

    <div class="rounded-[22px] bg-primary px-4 py-4 text-center text-sm font-semibold text-white shadow-[0_12px_24px_rgba(36,99,235,0.18)]">Сохранить изменения</div>
  </main>
</body>
</html>
