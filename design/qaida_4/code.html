<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0F0F0F",
                        "card-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
        .filter-option {
            border-radius: 1rem;
            border: 1.5px solid rgba(203, 213, 225, 0.92);
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }
        .filter-option--selected {
            border-color: rgba(36, 99, 235, 0.42);
            background: linear-gradient(180deg, #fbfdff, #f1f6ff);
            box-shadow: 0 10px 24px rgba(36, 99, 235, 0.08);
        }
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto border-x border-slate-200 dark:border-slate-800">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1">Фильтры</h2>
<button class="text-slate-500 dark:text-slate-400 flex size-12 shrink-0 items-center justify-end focus:outline-none">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-4 pt-2">
<div class="flex gap-6 justify-between">
<p class="text-[13px] font-semibold leading-normal text-slate-500 dark:text-slate-400">Шаг 1 из 4</p>
</div>
<div class="rounded-full h-1.5 bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 25%;"></div>
</div>
</div>
<!-- Header -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-left text-[31px] font-semibold leading-[1.06] tracking-[-0.03em] text-slate-900 dark:text-white">С кем идёшь?</h3><p class="mt-2 text-[15px] leading-6 text-slate-500 dark:text-slate-400">Выбери один вариант</p>
</div>
<!-- Content Grid -->
<div class="flex-1 overflow-y-auto px-4 py-4">
<div class="grid grid-cols-2 gap-4">
<!-- Option 1: Один -->
<div class="filter-option flex aspect-square cursor-pointer flex-col justify-end gap-4 p-5 relative transition-all" data-alt="Abstract minimalist silhouette icon on light background">
<div class="absolute inset-0 rounded-xl bg-gradient-to-t from-white/70 to-transparent"></div>
<div class="relative z-10">
<span class="material-symbols-outlined mb-3 block text-[34px] text-primary">person</span>
<p class="text-[17px] font-semibold leading-6 text-slate-800">Один</p>
</div>
</div>
<!-- Option 2: Пара -->
<div class="filter-option flex aspect-square cursor-pointer flex-col justify-end gap-4 p-5 relative transition-all" data-alt="Couple icon on light sophisticated background" style="background:linear-gradient(180deg,#ffffff,#fff9f6);">
<div class="absolute inset-0 rounded-xl bg-gradient-to-t from-white/70 to-transparent"></div>
<div class="relative z-10">
<span class="material-symbols-outlined mb-3 block text-[34px] text-primary">diversity_1</span>
<p class="text-[17px] font-semibold leading-6 text-slate-800">Пара</p>
</div>
</div>
<!-- Option 3: Друзья (Selected) -->
<div class="filter-option filter-option--selected flex aspect-square cursor-pointer flex-col justify-end gap-4 p-5 relative transition-all" data-alt="Group of friends icon on premium light background">
<div class="absolute inset-0 rounded-xl bg-gradient-to-t from-primary/4 to-transparent"></div>
<div class="relative z-10">
<div class="absolute -top-16 -right-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1,'wght' 500;">check_circle</span>
</div>
<span class="material-symbols-outlined mb-3 block text-[34px] text-primary">groups</span>
<p class="text-[17px] font-semibold leading-6 text-slate-800">Друзья</p>
</div>
</div>
<!-- Option 4: Семья -->
<div class="filter-option flex aspect-square cursor-pointer flex-col justify-end gap-4 p-5 relative transition-all" data-alt="Family icon on light minimalist background" style="background:linear-gradient(180deg,#ffffff,#fefdf3);">
<div class="absolute inset-0 rounded-xl bg-gradient-to-t from-white/70 to-transparent"></div>
<div class="relative z-10">
<span class="material-symbols-outlined mb-3 block text-[34px] text-primary">family_restroom</span>
<p class="text-[17px] font-semibold leading-6 text-slate-800">Семья</p>
</div>
</div>
</div>
</div>
<!-- Fixed Footer Action -->
<div class="p-4 pb-8 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
<button class="flex h-[52px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-[14px] bg-primary px-5 text-base font-semibold leading-normal text-white transition-transform active:scale-[0.98] shadow-[0_10px_20px_rgba(36,99,235,0.16)]">
<span class="truncate flex items-center gap-2">Далее <span class="material-symbols-outlined text-[20px]">arrow_forward</span></span>
</button>
</div>
</div>
</body></html>
