<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#2463eb','background-light':'#f6f7fb','background-dark':'#0f172a','card-dark':'#111827'}}}};</script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-background-light/90 p-4 backdrop-blur-md dark:border-slate-800 dark:bg-background-dark/90">
    <div class="flex items-center justify-between gap-3">
      <button class="flex size-10 items-center justify-center rounded-full text-slate-600 dark:text-slate-300"><span class="material-symbols-outlined">arrow_back</span></button>
      <h1 class="flex-1 pr-10 text-center text-lg font-bold">Настройки уведомлений</h1>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4">
    <section class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-card-dark">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Системные уведомления</p>
      <div class="mt-4 space-y-3">
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div><strong class="text-sm">Новые места рядом</strong><p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Когда появляются подходящие места поблизости.</p></div><div class="relative h-7 w-12 rounded-full bg-primary"><div class="absolute right-1 top-1 size-5 rounded-full bg-white"></div></div></div>
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div><strong class="text-sm">Напоминания о брони</strong><p class="mt-1 text-xs text-slate-500 dark:text-slate-400">За 30 минут до визита и в момент выхода.</p></div><div class="relative h-7 w-12 rounded-full bg-primary"><div class="absolute right-1 top-1 size-5 rounded-full bg-white"></div></div></div>
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><div><strong class="text-sm">Сохранённые коллекции</strong><p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Изменения в общих подборках и папках.</p></div><div class="relative h-7 w-12 rounded-full bg-slate-300 dark:bg-slate-700"><div class="absolute left-1 top-1 size-5 rounded-full bg-white"></div></div></div>
      </div>
    </section>

    <section class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-card-dark">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Каналы</p>
      <div class="mt-4 space-y-3">
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><strong class="text-sm">Push-уведомления</strong><span class="text-xs font-semibold text-primary">Включены</span></div>
        <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-950"><strong class="text-sm">Email-дайджест</strong><span class="text-xs font-semibold text-slate-400">1 раз в неделю</span></div>
      </div>
    </section>
  </main>
</body>
</html>
