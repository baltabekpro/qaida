<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2463eb',
            'background-light': '#f6f7fb',
            'background-dark': '#0f172a',
            'card-dark': '#111827'
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen overflow-hidden">
  <div class="relative min-h-screen">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,#dbeafe_0%,#eff6ff_30%,#f8fafc_65%)] p-4 dark:bg-[radial-gradient(circle_at_top,#172554_0%,#0f172a_45%,#020617_100%)]">
      <div class="rounded-[30px] bg-white/86 p-5 shadow-sm backdrop-blur-md dark:bg-slate-900/86">
        <div class="flex items-center gap-3">
          <div class="flex size-11 items-center justify-center rounded-2xl bg-blue-50 text-primary dark:bg-blue-500/15 dark:text-blue-200">
            <span class="material-symbols-outlined">search</span>
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Главная</p>
            <h1 class="text-lg font-bold">Что ищем сегодня?</h1>
          </div>
        </div>
        <div class="mt-5 h-32 rounded-[24px] bg-gradient-to-br from-blue-600 via-blue-500 to-cyan-400 p-4 text-white">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-white/70">Подборка</p>
          <p class="mt-2 text-2xl font-bold">Новые места рядом</p>
        </div>
      </div>
    </div>

    <div class="absolute inset-0 bg-slate-950/24 backdrop-blur-[2px]"></div>

    <div class="absolute left-1/2 top-1/2 w-[88%] max-w-[290px] -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-slate-200 bg-white p-5 shadow-[0_24px_60px_rgba(15,23,42,0.22)] dark:border-slate-800 dark:bg-slate-900">
      <div class="flex size-12 items-center justify-center rounded-2xl bg-blue-50 text-primary dark:bg-blue-500/15 dark:text-blue-200">
        <span class="material-symbols-outlined">notifications_active</span>
      </div>
      <h2 class="mt-5 text-2xl font-bold leading-tight">Включить уведомления?</h2>
      <p class="mt-3 text-sm leading-6 text-slate-500 dark:text-slate-400">Будем сообщать о новых местах рядом, сохранённых подборках и напоминаниях.</p>
      <div class="mt-6 flex gap-2">
        <button class="h-11 flex-1 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 dark:border-slate-700 dark:text-slate-200">Не сейчас</button>
        <button class="h-11 flex-1 rounded-2xl bg-primary text-sm font-bold text-white shadow-[0_14px_30px_rgba(37,99,235,0.22)]">Включить</button>
      </div>
    </div>
  </div>
</body>
</html>
