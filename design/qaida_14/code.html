<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2463eb',
            'background-light': '#f6f7fb',
            'background-dark': '#0f172a',
            'card-dark': '#111827'
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }
    @keyframes bookmarkRing {
      0% { transform: scale(0.72); opacity: 0; }
      20% { opacity: 0.3; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .save-trigger {
      position: relative;
      overflow: visible;
      background: rgba(36,99,235,0.12);
      color: #2463eb;
      box-shadow: 0 10px 24px rgba(36,99,235,0.16);
    }
    .save-trigger::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      border: 1px solid rgba(36,99,235,0.18);
      animation: bookmarkRing 1.6s ease-out infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-slate-50/90 p-4 backdrop-blur-md dark:border-slate-800 dark:bg-slate-950/90">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold">Результаты</h1>
    </div>
  </header>

  <main class="relative flex-1 overflow-y-auto p-4 pb-28">
    <div class="space-y-5">
      <article class="overflow-hidden rounded-[26px] border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="aspect-video bg-cover bg-center" style="background-image:url('https://lh3.googleusercontent.com/aida-public/AB6AXuCr8raYOcx7X8YoZb3obVLrxEweQc9BgjC4cpCM7jW6T_IJ-QRPYOubCP3VHuHtOlIIeECguyddGSd_Fb-8rWe3sc9FXDoLqO2W9fFozmJ7o4GeZKsSt2_MKr5ny_v2ZkMYOXJKV4QEp_hsf_VFKzyEBZ7k129nvFCZc84XkJAjaSqHuJQKA_p53GjvYIV7BO3GcEuW16AtyN3b6I74Iz1R2S8SUA9nGT-4T6cywTuGTyPa3oamjaVUpkGFWHDl-eidZC07BdHs8Q');"></div>
        <div class="p-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h2 class="text-2xl font-bold">The Choco</h2>
              <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">4.9 · 1.2 км · ул. Абая</p>
            </div>
            <button class="save-trigger flex size-11 items-center justify-center rounded-2xl dark:bg-blue-500/15 dark:text-blue-200">
              <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1,'wght' 600;">bookmark</span>
            </button>
          </div>
          <div class="mt-4 flex gap-2">
            <button class="h-11 flex-1 rounded-2xl bg-primary text-sm font-bold text-white">Идём</button>
            <button class="h-11 flex-1 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 dark:border-slate-700 dark:text-slate-200">Подробнее</button>
          </div>
        </div>
      </article>

      <article class="overflow-hidden rounded-[26px] border border-slate-200 bg-white shadow-sm opacity-80 dark:border-slate-800 dark:bg-slate-900">
        <div class="aspect-video bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=600&q=80');"></div>
        <div class="p-4">
          <h2 class="text-xl font-bold">Nomad Cuisine</h2>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">4.8 · 3.1 км · традиционная кухня</p>
        </div>
      </article>
    </div>
  </main>

  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(255,255,255,0.98) 0%,rgba(255,255,255,0.72) 55%,transparent 100%);padding-bottom:20px;display:flex;justify-content:center;align-items:flex-end;z-index:50;pointer-events:none;min-height:110px;">
    <nav style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.78);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid rgba(148,163,184,.28);border-radius:9999px;padding:8px 16px;box-shadow:0 12px 30px rgba(15,23,42,.12),0 0 0 0.5px rgba(255,255,255,.9) inset;pointer-events:auto;">
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;border-radius:9999px;text-decoration:none;"><span class="material-symbols-outlined" style="font-size:20px;color:#64748b;">home</span><span style="font-size:9px;font-weight:500;color:#64748b;font-family:Inter,sans-serif;">Главная</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;border-radius:9999px;background:rgba(36,99,235,.14);box-shadow:inset 0 0 0 1px rgba(36,99,235,.06);text-decoration:none;"><span class="material-symbols-outlined" style="font-size:20px;color:#2463eb;font-variation-settings:'FILL' 1,'wght' 400;">search</span><span style="font-size:9px;font-weight:600;color:#2463eb;font-family:Inter,sans-serif;">Поиск</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;border-radius:9999px;text-decoration:none;"><span class="material-symbols-outlined" style="font-size:20px;color:#64748b;">bookmark</span><span style="font-size:9px;font-weight:500;color:#64748b;font-family:Inter,sans-serif;">Сохранено</span></a>
      <a href="#" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;border-radius:9999px;text-decoration:none;"><span class="material-symbols-outlined" style="font-size:20px;color:#64748b;">person</span><span style="font-size:9px;font-weight:500;color:#64748b;font-family:Inter,sans-serif;">Профиль</span></a>
    </nav>
  </div>
</body>
</html>
